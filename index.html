<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube to MP3 Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #212121;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .logo {
            font-size: 55px;
            color: #FF0000;
            margin-bottom: 15px;
        }
        h1 span { color: #FF0000; }
        p { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        .box { display: flex; flex-direction: column; gap: 15px; }
        input {
            padding: 14px;
            border-radius: 25px;
            border: 1px solid #3c3c3c;
            background-color: #121212;
            color: white;
            font-size: 14px;
            text-align: center;
            outline: none;
        }
        input:focus { border-color: #FF0000; }
        button {
            padding: 14px;
            border-radius: 25px;
            border: none;
            background-color: #FF0000;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #cc0000; }
        #status { margin-top: 20px; font-size: 14px; color: #b3b3b3; }
    </style>
</head>
<body>

    <div class="container">
        <i class="fa-brands fa-youtube logo"></i>
        <h1>YouTube to <span>MP3</span></h1>
        <p>Paste a YouTube video link below to download its audio track.</p>

        <div class="box">
            <input id="videoLink" type="text" placeholder="Paste YouTube link here...">
            <button onclick="downloadAudio()">Download MP3</button>
        </div>
        <div id="status"></div>
    </div>

    <script>
        function downloadAudio() {
            const videoUrl = document.getElementById('videoLink').value.trim();
            const statusDiv = document.getElementById('status');

            if (!videoUrl) {
                alert("Please paste a YouTube URL first!");
                return;
            }

            statusDiv.innerText = "Connecting to backend engine & converting audio... please wait.";

            // Pass the URL to your locally running Node.js backend server
            const backendUrl = `http://localhost:3000/download?url=${encodeURIComponent(videoUrl)}`;
            
            // Open the backend download link in a new tab/window to trigger the native file download
            window.location.href = backendUrl;

            setTimeout(() => {
                statusDiv.innerText = "Check your browser downloads! If it failed, verify your backend server is running.";
            }, 3000);
        }
    </script>
</body>
</html>
